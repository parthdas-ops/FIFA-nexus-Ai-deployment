<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Nexus — FIFA Nexus AI Portal Authentication</title>
  <meta name="description" content="Secure identity validation desk for the FIFA Nexus AI OS smart stadium portals." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' ; style-src 'self'  https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/shared.css" />
  
  <link rel="stylesheet" href="../assets/css/auth.css" />
  <script src="../assets/js/utils.js"></script>
</head>
<body>

  <div class="glow-blob-1"></div>
  <div class="glow-blob-2"></div>

  <a href="../index.html" class="back-btn">← Back to Stadium Info</a>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <div class="logo-container">
          <svg viewBox="0 0 100 100" width="56" height="56" style="filter: drop-shadow(0 0 8px rgba(0, 229, 204, 0.5));">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00E5CC" />
                <stop offset="100%" stop-color="#0080FF" />
              </linearGradient>
            </defs>
            <polygon points="50,12 85,32 85,68 50,88 15,68 15,32" fill="none" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="50" cy="30" r="5" fill="#FFF" />
            <circle cx="33" cy="53" r="4" fill="#00E5CC" />
            <circle cx="67" cy="53" r="4" fill="#00E5CC" />
            <circle cx="50" cy="70" r="5" fill="#0080FF" />
            <line x1="50" y1="30" x2="33" y2="53" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="50" y1="30" x2="67" y2="53" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="33" y1="53" x2="50" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="67" y1="53" x2="50" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="33" y1="53" x2="67" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="2,2" />
            <circle cx="50" cy="50" r="7.5" fill="url(#logo-grad)" />
          </svg>
        </div>
        <h1 class="auth-title">FIFA Nexus OS</h1>
        <p class="auth-subtitle">Verify identity to unlock your role console</p>
      </div>

      <!-- Role Selector -->
      <div class="role-badges-container">
        <span class="role-badge-select active" role="button" tabindex="0" aria-label="Select Fan role" data-role="fan" data-action="setRole" data-target="fan">Fan</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Admin role" data-role="admin" data-action="setRole" data-target="admin">Admin</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Volunteer role" data-role="volunteer" data-action="setRole" data-target="volunteer">Volunteer</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Vendor role" data-role="vendor" data-action="setRole" data-target="vendor">Vendor</span>
      </div>

      <form id="auth-form" id="auth-form">
        <div class="form-group">
          <label class="form-label" for="email">Nexus ID / Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input class="input auth-input" type="email" id="email" placeholder="name@nexus.fifa.com" required value="fan.guest@worldcup2026.com" maxlength="254" autocomplete="email" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="input auth-input" type="password" id="password" placeholder="••••••••" required value="nexusguestpass2026" maxlength="128" autocomplete="current-password" />
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me" for="remember-device">
            <input type="checkbox" id="remember-device" checked />
            Remember my device
          </label>
          <a class="forgot-link" href="#" data-action="alert" data-message="Demo notice: Security key fallback link sent to device email.">Forgot PIN?</a>
        </div>

        <button class="btn btn-primary btn-submit" type="submit">Verify Credentials & Enter</button>
      </form>

      <div class="divider">Or Authenticate Biometrically</div>

      <div class="biometric-options" style="grid-template-columns: 1fr;">
        <button class="biometric-btn" data-action="startBiometric" data-type="face" style="flex-direction: row; justify-content: center; gap: 12px; padding: 14px;">
          <span class="biometric-icon" style="font-size: 20px;">👤</span>
          <span style="font-size: 14px; font-weight: 600;">Initiate Live Face Scanner Verification</span>
        </button>
      </div>

      <div class="auth-footer">
        New to Nexus? <a href="#" data-action="alert" data-message="Register flow simulation: Registered guest account.">Register ticket profile</a>
      </div>
    </div>
  </div>

  <!-- Face Biometrics Scan Modal -->
  <div class="scan-modal" id="scan-modal">
    <div class="scan-box glass-card">
      <div class="scan-frame" id="scan-frame">
        <div class="scan-laser" id="scan-laser"></div>
        <span class="scan-face-icon" id="scan-icon">👤</span>
      </div>
      <div class="scan-status" id="scan-status" aria-live="assertive">Initializing Camera...</div>
      <div class="scan-subtext" id="scan-subtext">Align your face with the bounding oval container.</div>
      <button class="btn btn-outline btn-sm" data-action="cancelScan">Cancel Verification</button>
    </div>
  </div>

  
  <script src="../assets/js/auth.js"></script>
</body>
</html>
