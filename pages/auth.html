<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Nexus — FIFA Nexus AI Portal Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/shared.css" />
  <style>
    body {
      background: radial-gradient(ellipse at 50% 50%, #081022 0%, #050a14 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Glowing decorative blobs */
    .glow-blob-1 {
      position: absolute; top: -10%; left: -10%; width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(0, 229, 204, 0.15) 0%, transparent 70%);
      filter: blur(50px); pointer-events: none;
    }
    .glow-blob-2 {
      position: absolute; bottom: -10%; right: -10%; width: 40%; height: 40%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      filter: blur(50px); pointer-events: none;
    }

    .auth-container {
      width: 100%;
      max-width: 390px;
      position: relative;
      z-index: 10;
    }

    .auth-card {
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 30px 24px;
      box-shadow: var(--shadow-lg), 0 0 35px rgba(0, 229, 204, 0.08);
      position: relative;
      border-radius: var(--radius-lg);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px rgba(0, 229, 204, 0.4));
    }

    .auth-title {
      font-size: 23px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #FFF 40%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 16px;
    }

    .auth-input {
      padding-left: 42px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-secondary);
    }

    .remember-me input {
      accent-color: var(--primary);
    }

    .forgot-link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      justify-content: center;
      font-size: 15px;
      padding: 12px;
      margin-bottom: 20px;
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }

    .divider:not(:empty)::before { margin-right: .5em; }
    .divider:not(:empty)::after { margin-left: .5em; }

    .biometric-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .biometric-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all var(--trans-fast);
    }

    .biometric-btn:hover {
      background: var(--primary-dim);
      border-color: rgba(0, 229, 204, 0.3);
      color: var(--primary);
      transform: translateY(-2px);
    }

    .biometric-icon {
      font-size: 24px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Biometric Scan Modal overlay */
    .scan-modal {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 20, 0.9);
      backdrop-filter: blur(10px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--trans-base);
    }

    .scan-modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .scan-box {
      width: 320px;
      padding: 30px;
      text-align: center;
      border: 1px solid rgba(0, 229, 204, 0.2);
      box-shadow: 0 0 40px rgba(0, 229, 204, 0.1);
      position: relative;
    }

    .scan-frame {
      width: 140px;
      height: 140px;
      margin: 0 auto 24px;
      border: 2px solid rgba(0, 229, 204, 0.3);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 229, 204, 0.03);
    }

    .scan-face-icon {
      font-size: 70px;
      color: var(--text-muted);
      transition: color var(--trans-slow);
    }

    /* Laser beam animation */
    .scan-laser {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      box-shadow: 0 0 10px var(--primary);
      animation: scanLines 2s infinite ease-in-out;
      display: none;
    }

    @keyframes scanLines {
      0%, 100% { top: 0%; }
      50% { top: 100%; }
    }

    .scan-status {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .scan-subtext {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    /* Role selector banner */
    .role-badges-container {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .role-badge-select {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      transition: all var(--trans-fast);
    }

    .role-badge-select:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
    }

    .role-badge-select.active {
      border-color: var(--primary);
      background: var(--primary-dim);
      color: var(--primary);
    }

    .back-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="glow-blob-1"></div>
  <div class="glow-blob-2"></div>

  <a href="../index.html" class="back-btn">← Back to Stadium Info</a>

  <div class="auth-container">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <div class="logo-container">
          <svg viewBox="0 0 100 100" width="56" height="56" style="filter: drop-shadow(0 0 8px rgba(0, 229, 204, 0.5));">
            <defs>
              <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00E5CC" />
                <stop offset="100%" stop-color="#0080FF" />
              </linearGradient>
            </defs>
            <polygon points="50,12 85,32 85,68 50,88 15,68 15,32" fill="none" stroke="url(#logo-grad)" stroke-width="4.5" stroke-linejoin="round" />
            <circle cx="50" cy="30" r="5" fill="#FFF" />
            <circle cx="33" cy="53" r="4" fill="#00E5CC" />
            <circle cx="67" cy="53" r="4" fill="#00E5CC" />
            <circle cx="50" cy="70" r="5" fill="#0080FF" />
            <line x1="50" y1="30" x2="33" y2="53" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="50" y1="30" x2="67" y2="53" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="33" y1="53" x2="50" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="67" y1="53" x2="50" y2="70" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" />
            <line x1="33" y1="53" x2="67" y2="53" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="2,2" />
            <circle cx="50" cy="50" r="7.5" fill="url(#logo-grad)" />
          </svg>
        </div>
        <h1 class="auth-title">FIFA Nexus OS</h1>
        <p class="auth-subtitle">Verify identity to unlock your role console</p>
      </div>

      <!-- Role Selector -->
      <div class="role-badges-container">
        <span class="role-badge-select active" role="button" tabindex="0" aria-label="Select Fan role" data-role="fan" onclick="setRole('fan')" onkeydown="if(event.key==='Enter'||event.key===' ')setRole('fan')">Fan</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Admin role" data-role="admin" onclick="setRole('admin')" onkeydown="if(event.key==='Enter'||event.key===' ')setRole('admin')">Admin</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Volunteer role" data-role="volunteer" onclick="setRole('volunteer')" onkeydown="if(event.key==='Enter'||event.key===' ')setRole('volunteer')">Volunteer</span>
        <span class="role-badge-select" role="button" tabindex="0" aria-label="Select Vendor role" data-role="vendor" onclick="setRole('vendor')" onkeydown="if(event.key==='Enter'||event.key===' ')setRole('vendor')">Vendor</span>
      </div>

      <form id="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Nexus ID / Email</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input class="input auth-input" type="email" id="email" placeholder="name@nexus.fifa.com" required value="fan.guest@worldcup2026.com" />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Security Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input class="input auth-input" type="password" id="password" placeholder="••••••••" required value="nexusguestpass2026" />
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me" for="remember-device">
            <input type="checkbox" id="remember-device" checked />
            Remember my device
          </label>
          <a class="forgot-link" href="#" onclick="alert('Demo notice: Security key fallback link sent to device email.')">Forgot PIN?</a>
        </div>

        <button class="btn btn-primary btn-submit" type="submit">Verify Credentials & Enter</button>
      </form>

      <div class="divider">Or Authenticate Biometrically</div>

      <div class="biometric-options" style="grid-template-columns: 1fr;">
        <button class="biometric-btn" onclick="startBiometric('face')" style="flex-direction: row; justify-content: center; gap: 12px; padding: 14px;">
          <span class="biometric-icon" style="font-size: 20px;">👤</span>
          <span style="font-size: 14px; font-weight: 600;">Initiate Live Face Scanner Verification</span>
        </button>
      </div>

      <div class="auth-footer">
        New to Nexus? <a href="#" onclick="alert('Register flow simulation: Registered guest account.')">Register ticket profile</a>
      </div>
    </div>
  </div>

  <!-- Face Biometrics Scan Modal -->
  <div class="scan-modal" id="scan-modal">
    <div class="scan-box glass-card">
      <div class="scan-frame" id="scan-frame">
        <div class="scan-laser" id="scan-laser"></div>
        <span class="scan-face-icon" id="scan-icon">👤</span>
      </div>
      <div class="scan-status" id="scan-status">Initializing Camera...</div>
      <div class="scan-subtext" id="scan-subtext">Align your face with the bounding oval container.</div>
      <button class="btn btn-outline btn-sm" onclick="cancelScan()">Cancel Verification</button>
    </div>
  </div>

  <script>
    let activeRole = 'fan';

    // Parse URL parameter on load
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const roleParam = urlParams.get('role');
      if (roleParam && ['fan', 'admin', 'volunteer', 'vendor'].includes(roleParam)) {
        setRole(roleParam);
      } else {
        setRole('fan'); // Default fallback
      }
    });

    function setRole(role) {
      activeRole = role;
      document.querySelectorAll('.role-badge-select').forEach(el => {
        el.classList.remove('active');
        if (el.dataset.role === role) el.classList.add('active');
      });

      // Update mock placeholder emails
      const emailInput = document.getElementById('email');
      const passInput = document.getElementById('password');
      if (role === 'fan') {
        emailInput.value = 'fan.guest@worldcup2026.com';
        passInput.value = 'nexusguestpass2026';
      } else if (role === 'admin') {
        emailInput.value = 'commander.hq@nexus.fifa.com';
        passInput.value = 'commandsecureroot2026';
      } else if (role === 'volunteer') {
        emailInput.value = 'volunteer.assist@crew.fifa.org';
        passInput.value = 'crewvolunteersecure';
      } else if (role === 'vendor') {
        emailInput.value = 'vendor.kitchen@concessions.com';
        passInput.value = 'vendorsecurekitchen';
      }
    }

    const CREDENTIALS = {
      fan: { email: 'fan.guest@worldcup2026.com', password: 'nexusguestpass2026' },
      admin: { email: 'commander.hq@nexus.fifa.com', password: 'commandsecureroot2026' },
      volunteer: { email: 'volunteer.assist@crew.fifa.org', password: 'crewvolunteersecure' },
      vendor: { email: 'vendor.kitchen@concessions.com', password: 'vendorsecurekitchen' }
    };

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const expected = CREDENTIALS[activeRole];
      if (expected && expected.email === email && expected.password === password) {
        sessionStorage.setItem('nexus_user', JSON.stringify({ email, role: activeRole }));
        window.location.href = activeRole + '.html';
      } else {
        alert('Authentication failed: Invalid credentials for the selected role.');
      }
    }

    function startBiometric(type) {
      const modal = document.getElementById('scan-modal');
      const laser = document.getElementById('scan-laser');
      const icon = document.getElementById('scan-icon');
      const status = document.getElementById('scan-status');
      const subtext = document.getElementById('scan-subtext');

      modal.classList.add('active');

      if (type === 'face') {
        laser.style.display = 'block';
        icon.textContent = '👤';
        icon.style.color = 'var(--text-secondary)';
        status.textContent = 'Scanning Face Geometry...';
        subtext.textContent = 'Reading 486 points of interest on device sensor.';

        setTimeout(() => {
          status.textContent = 'Matching Neural Signature...';
          icon.style.color = 'var(--primary)';
        }, 1500);

        setTimeout(() => {
          status.textContent = 'Authentication Granted!';
          icon.textContent = '✓';
          icon.style.color = 'var(--success)';
          laser.style.display = 'none';
        }, 3000);

        setTimeout(() => {
          const email = CREDENTIALS[activeRole]?.email || `${activeRole}.guest@worldcup2026.com`;
          sessionStorage.setItem('nexus_user', JSON.stringify({ email, role: activeRole }));
          window.location.href = activeRole + '.html';
        }, 3800);

      } else {
        // Passkey flow
        laser.style.display = 'none';
        icon.textContent = '🔑';
        icon.style.color = 'var(--text-secondary)';
        status.textContent = 'Querying Hardware Passkey...';
        subtext.textContent = 'Touch your security key or biometric credential sensor.';

        setTimeout(() => {
          status.textContent = 'Signature Verified!';
          icon.textContent = '✓';
          icon.style.color = 'var(--success)';
        }, 1500);

        setTimeout(() => {
          const email = CREDENTIALS[activeRole]?.email || `${activeRole}.guest@worldcup2026.com`;
          sessionStorage.setItem('nexus_user', JSON.stringify({ email, role: activeRole }));
          window.location.href = activeRole + '.html';
        }, 2200);
      }
    }

    function cancelScan() {
      document.getElementById('scan-modal').classList.remove('active');
    }
  </script>
</body>
</html>
